<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dhanaṁ favicon — D-mark with rising trend line -->
  <!-- Background: near-black with warm green tint, 7px rounded corners -->
  <rect width="32" height="32" rx="7" fill="#060D09"/>

  <!--
    D lettermark using evenodd fill-rule so the inner path punches
    a true transparent hole (not just a same-color overlay).

    Outer D:
      M7 7          — top-left of stem
      h9            — top bar to (16,7)
      A9 9 0 0 1    — clockwise semicircle, r=9
      16 25         — lands at (16,25) via rightmost apex (25,16)
      H7 Z          — bottom bar back to (7,25), stem closes to (7,7)

    Inner cutout (stem 4 px, curve wall 4 px):
      M11 11
      h5            — inner top bar to (16,11)
      A5 5 0 0 1    — clockwise semicircle, r=5
      16 21         — via apex (21,16)
      h-5 Z         — inner bottom bar, closes to (11,11)
  -->
  <path
    fill-rule="evenodd"
    d="M7 7h9A9 9 0 0 1 16 25H7ZM11 11h5A5 5 0 0 1 16 21h-5Z"
    fill="#2D7A3E"
  />

  <!-- Rising trend line inside the D's opening -->
  <path
    d="M12.5 19.5 L15 15.5 L18 12.5"
    stroke="#AEE7B1"
    stroke-width="1.6"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />

  <!-- Accent dot at the peak of the trend line -->
  <circle cx="18" cy="12.5" r="1.4" fill="#AEE7B1"/>
</svg>
