# Render Blueprint for the Dhanaṁ FastAPI backend.
# Deploy via Render → New → Blueprint (point it at this repo), or replicate
# these settings manually in a Web Service. Secret values (sync: false) are
# entered in the Render dashboard, never committed.
services:
  - type: web
    name: dhanam-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      # Comma-separated production origins (your Vercel URL). Set in dashboard.
      - key: ALLOWED_ORIGINS
        sync: false
      # base64 of firebase-adminsdk.json. Set in dashboard (secret).
      - key: FIREBASE_SERVICE_ACCOUNT_B64
        sync: false
